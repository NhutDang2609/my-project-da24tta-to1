			<form id="frmInBCC">
    <h2>IN BẢNG CỬU CHƯƠNG</h2>


<br>
<br>
    <label class="form-control" for="txtUser"><b>Nhập số từ 2-9</b></label>
    <input class="form-control" type="number" id="txtUser" name="txtUser">
    <button type="button" onclick="inBCC()">IN</button>

    <div id="kq"></div>
</form>

<script>
function inBCC(){
    let num = parseInt(document.getElementById("txtUser").value);
    let kq = "";

    if (!num || num < 2 || num > 9) {
        alert("Nhập từ 2-9");
        return;
    }

    for(let i = 1; i <= 10; i++){
        kq += `${num} x ${i} = ${num * i}<br>`;
    }

    document.getElementById("kq").innerHTML = kq;
}
</script>
