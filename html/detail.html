<div class="mt-3 d-flex gap-2">

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const productId = Number(urlParams.get("id"));
  const addedProducts = JSON.parse(localStorage.getItem("shopAddedProducts") || "[]");
const allProducts = [...productDatabase, ...addedProducts];
const product = allProducts.find(p => p.id === productId);

  if (product) {
    document.getElementById("p-name").innerText = product.name;
    document.getElementById("p-price").innerText = product.price.toLocaleString() + " VND";
    document.getElementById("p-image").src = product.img;
    document.getElementById("p-image").alt = product.name;
    document.getElementById("p-description").innerText = product.desc;
  }

  function capNhatNut() {
    const deletedIds = JSON.parse(localStorage.getItem("shopDeletedIds") || "[]");
    document.getElementById("btn-xoa").disabled = deletedIds.includes(productId);
  }

  function handleXoa() {
    const deletedIds = JSON.parse(localStorage.getItem("shopDeletedIds") || "[]");
    if (!deletedIds.includes(productId)) {
      deletedIds.push(productId);
      localStorage.setItem("shopDeletedIds", JSON.stringify(deletedIds));
    }
    alert("Đã xóa sản phẩm khỏi danh sách!");
    capNhatNut();
  }

  capNhatNut();
</script>
