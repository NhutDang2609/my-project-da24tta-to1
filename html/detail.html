<script>
  const urlParams = new URLSearchParams(window.location.search);
  const productId = urlParams.get("id");

  const product = productDatabase.find(p => p.id === Number(productId));

  if (product) {
    document.getElementById("p-name").innerText = product.name;
    document.getElementById("p-price").innerText = product.price.toLocaleString() + " VND";
    document.getElementById("p-image").src = product.img;
    document.getElementById("p-image").alt = product.name;

    document.getElementById("p-description").innerText = product.desc; // ✅ sửa id và field name
  }
</script>
