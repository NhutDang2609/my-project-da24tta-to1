<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <title>KHO ẨN - SẢN PHẨM HẾT HÀNG</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="../css/style7.css">
  <script src="../js/lib.js"></script>
  <style>
    .product-an {
      border: 2px dashed #e74c3c;
      border-radius: 10px;
      overflow: hidden;
      background: #fff5f5;
      margin-bottom: 24px;
      opacity: 0.85;
    }
    .product-an img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      filter: grayscale(40%);
    }
    .product-an .info { padding: 12px; }
    .product-an .info .ten { font-weight: bold; font-size: 1rem; }
    .product-an .info .gia { color: #e74c3c; font-size: 0.9rem; }
    .badge-het { 
      background: #e74c3c; color: white; 
      font-size: 0.75rem; padding: 2px 8px; 
      border-radius: 4px; display: inline-block; margin-bottom: 6px;
    }
    .trang-trong {
      text-align: center; padding: 80px 20px; color: #999;
    }
    .trang-trong h4 { font-size: 1.2rem; margin-top: 12px; }
  </style>
</head>
<body>
<nav>
  <a class="thanhba" href="../index.html">TRANG CHỦ</a>
  <a class="thanhba" href="page1.html">THÔNG TIN CÁ NHÂN</a>
  <a class="thanhba" href="page2.html">ĐĂNG NHẬP</a>
  <a class="thanhba" href="page3.html">ĐĂNG KÝ</a>
  <a class="thanhba" href="page4.html">HÓA ĐƠN THANH TOÁN</a>
  <a class="thanhba" href="page5.html">IN BẢNG CỬU CHƯƠNG</a>
  <a class="thanhba" href="page6.html">BẢNG HỌC PHÍ</a>
  <a class="thanhba" href="page7.html">SẢN PHẨM</a>
</nav>

<div class="container mt-4">
  <h3 class="mb-1">🗃 Kho ẩn — Sản phẩm hết hàng</h3>
  <p class="text-muted mb-4">Các sản phẩm bên dưới đang bị ẩn. Bấm <strong>Khôi phục</strong> để hiển thị lại trên trang Sản phẩm.</p>
  <div id="danh-sach-an" class="row"></div>
</div>

<script>
  function renderKhoAn() {
    const container = document.getElementById("danh-sach-an");
    container.innerHTML = "";

    const deletedIds = JSON.parse(localStorage.getItem("shopDeletedIds") || "[]");
    const sanPhamAn = productDatabase.filter(p => deletedIds.includes(p.id));

    if (sanPhamAn.length === 0) {
      container.innerHTML = `
        <div class="trang-trong">
          <div style="font-size:3rem;">✅</div>
          <h4>Không có sản phẩm nào bị ẩn</h4>
          <a href="page7.html" class="btn btn-info mt-3">← Quay lại trang Sản phẩm</a>
        </div>`;
      return;
    }

    sanPhamAn.forEach(product => {
      const col = document.createElement("div");
      col.setAttribute("class", "col-sm-6 col-md-4 col-lg-3");

      col.innerHTML = `
        <div class="product-an">
          <img src="${product.img}" alt="${product.name}">
          <div class="info">
            <span class="badge-het">⛔ Hết hàng</span>
            <p class="ten">${product.name}</p>
            <p class="gia">${product.price.toLocaleString()} VND</p>
            <button class="btn btn-warning btn-sm w-100" onclick="khôiPhuc(${product.id})">
              ♻️ Khôi phục
            </button>
          </div>
        </div>`;

      container.appendChild(col);
    });
  }

  function khôiPhuc(id) {
    const deletedIds = JSON.parse(localStorage.getItem("shopDeletedIds") || "[]");
    const newIds = deletedIds.filter(i => i !== id);
    localStorage.setItem("shopDeletedIds", JSON.stringify(newIds));
    renderKhoAn(); // cập nhật lại danh sách ngay
  }

  renderKhoAn();
</script>

<footer>Trang web được thiết kế bởi VŨ THỊ NHỰT ĐANG@2026 trên html tĩnh</footer>
</body>
</html>
